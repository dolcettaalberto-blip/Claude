<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ITBS Rehab Tracker</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #edf3fb; color: #0f172a; }
    #root { min-height: 100vh; }
    #loader { display: flex; align-items: center; justify-content: center; height: 100vh; font-family: monospace; color: #64748b; letter-spacing: 2px; }
  </style>
</head>
<body>
  <div id="root"><div id="loader">LOADING ITBS TRACKER…</div></div>

  <!-- React + ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

  <!-- prop-types (required by Recharts) -->
  <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>

  <!-- Recharts (UMD) — stable version -->
  <script src="https://unpkg.com/recharts@2.9.0/umd/Recharts.js"></script>

  <!-- Babel standalone for JSX -->
  <script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>

  <script type="text/babel" data-presets="react">
    // Shim: make Recharts available as a module-like import
    const {
      ComposedChart, LineChart, BarChart, Line, Bar,
      XAxis, YAxis, CartesianGrid, Tooltip,
      ResponsiveContainer, ReferenceLine, Cell
    } = Recharts;

    const { useState, useEffect, useCallback, useMemo } = React;

    // ─── CONFIG ────────────────────────────────────────────────────────────

    const INJURY_DATE = '2026-03-24';
    const HRV_BASELINE = 60;
    const SHEET_ID = '1W4gds8ZClrWikkKKF27yY6riQnUFPtWKaGEeKbZe4to';
    const SP = 'itbs:';

    const C = {
      bg: '#edf3fb', surface: '#ffffff', surface2: '#edf3fb', surface3: '#ddeaf7',
      border: '#ccddf2', border2: '#aac5e6',
      right: '#ea580c', left: '#2563eb',
      hrv: '#059669', warn: '#d97706', crit: '#dc2626', muted: '#94a3b8',
      text: '#0f172a', textDim: '#475569',
    };

    const MONO = "'IBM Plex Mono', 'Courier New', monospace";
    const SANS = "'Montserrat', system-ui, sans-serif";

    const EX = {
      '1A': {
        name: 'Split Squat Series', track: '1', bilateral: true,
        levels: [
          { n: 1, name: 'BW Split Squat', sets: 3, reps: '8/leg' },
          { n: 2, name: 'Elevated RFESS', sets: 3, reps: '8/leg' },
          { n: 3, name: 'Single Leg Squat', sets: 3, reps: '8/leg' },
        ],
      },
      '1B': {
        name: 'Step Up / Step Down', track: '1', bilateral: true,
        levels: [
          { n: 1, name: 'Step Up', sets: 3, reps: '10/leg' },
          { n: 2, name: 'Step Down Eccentric', sets: 3, reps: '10/leg' },
          { n: '3A', name: 'Single Leg Step Down', sets: 3, reps: '10/leg' },
          { n: '3B', name: 'Lateral Step Down', sets: 3, reps: '10/leg' },
        ],
      },
      '2A': {
        name: 'Hamstring Slider Series', track: '2', bilateral: true,
        levels: [
          { n: 1, name: 'Single Leg Bridge', sets: 3, reps: '12/leg' },
          { n: 2, name: 'Hamstring Curl Concentric', sets: 3, reps: '8/leg' },
          { n: 3, name: 'Hamstring Curl Eccentric', sets: 3, reps: '8/leg' },
          { n: 4, name: 'Full Nordic Curl Prog.', sets: 3, reps: '6/leg' },
        ],
      },
      '2B': {
        name: 'Nordic Hamstring Curl', track: '2', bilateral: true,
        levels: [
          { n: 1, name: 'Assisted Nordic Curl', sets: 3, reps: '6/leg' },
          { n: 2, name: 'Nordic Curl', sets: 3, reps: '6/leg' },
          { n: 3, name: 'Weighted Nordic Curl', sets: 3, reps: '6/leg' },
        ],
      },
      '3A': {
        name: 'Side Plank Series', track: '3', bilateral: true,
        levels: [
          { n: 1, name: 'Standard Side Plank', sets: 3, reps: '30s/side' },
          { n: 2, name: 'Side Plank Hip Dip', sets: 3, reps: '12/side' },
          { n: 3, name: 'Side Plank Leg Raise', sets: 3, reps: '12/side' },
        ],
      },
      '3B': {
        name: 'Band Series', track: '3', bilateral: true,
        levels: [
          { n: 1, name: 'Clamshell', sets: 3, reps: '15/side' },
          { n: 2, name: 'Side-lying Abduction', sets: 3, reps: '15/side' },
          { n: 3, name: 'Standing Abduction', sets: 3, reps: '15/side' },
        ],
      },
      '4A': {
        name: 'Calf Raises Straight Knee', track: '4', bilateral: true,
        levels: [
          { n: 1, name: 'Bilateral Calf Raise', sets: 3, reps: '20' },
          { n: 2, name: 'Single Leg Calf Raise', sets: 3, reps: '15/leg' },
          { n: 3, name: 'SL Calf Raise + Load', sets: 3, reps: '15/leg' },
        ],
      },
      '4B': {
        name: 'Calf Raises Bent Knee', track: '4', bilateral: true,
        levels: [
          { n: 1, name: 'Bilateral Bent Knee CR', sets: 3, reps: '20' },
          { n: 2, name: 'SL Bent Knee CR', sets: 3, reps: '15/leg' },
          { n: 3, name: 'SL Bent Knee + Load', sets: 3, reps: '15/leg' },
        ],
      },
    };

    const RUN_WEEKS = [
      { week: 1, run: 1, walk: 2, reps: 10, freq: 3 },
      { week: 2, run: 2, walk: 2, reps: 8, freq: 3 },
      { week: 3, run: 3, walk: 1, reps: 6, freq: 3 },
      { week: 4, run: null, walk: null, reps: null, freq: 3, desc: 'Continuous running, progressive duration' },
    ];

    // ─── STORAGE ───────────────────────────────────────────────────────────

    const store = {
      get(k) {
        try {
          const s = (window.storage && typeof window.storage.getItem === 'function') ? window.storage : localStorage;
          const v = s.getItem(SP + k);
          return v ? JSON.parse(v) : null;
        } catch { return null; }
      },
      set(k, v) {
        try {
          const s = (window.storage && typeof window.storage.setItem === 'function') ? window.storage : localStorage;
          s.setItem(SP + k, JSON.stringify(v));
          return true;
        } catch { return false; }
      },
    };

    // ─── DATE UTILS ────────────────────────────────────────────────────────

    const today = () => new Date().toISOString().slice(0, 10);
    const daysSince = (d) => Math.floor((Date.now() - new Date(d + 'T12:00:00').getTime()) / 86400000);
    const addDays = (d, n) => {
      const dt = new Date(d + 'T12:00:00');
      dt.setDate(dt.getDate() + n);
      return dt.toISOString().slice(0, 10);
    };
    const fmtShort = (d) => new Date(d + 'T12:00:00').toLocaleDateString('en-GB', { day: '2-digit', month: 'short' });
    const fmtTime = (iso) => iso ? new Date(iso).toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' }) : '—';

    // ─── HRV SYNC ──────────────────────────────────────────────────────────

    async function syncHRV() {
      const url = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQRo0q5gSheb-e2_Jo-s7y6uIf8mcZcEzyjET61oGfDJ_2bybXh0o8FDErqNrysEMCM3fYu2KfGHyzD/pub?gid=1605637632&single=true&output=csv';
      const resp = await fetch(url);
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const csv = await resp.text();
      const lines = csv.trim().split('\n');
      if (lines.length < 2) throw new Error('Empty sheet');
      const headers = lines[0].split(',').map(h => h.replace(/"/g, '').trim().toLowerCase());
      const idIdx = headers.indexOf('id');
      const hrvIdx = headers.indexOf('hrv');
      if (idIdx < 0 || hrvIdx < 0) throw new Error(`Columns missing`);
      const data = [];
      for (let i = 1; i < lines.length; i++) {
        const cols = lines[i].split(',');
        const date = (cols[idIdx] || '').replace(/"/g, '').trim();
        const hrv = parseFloat((cols[hrvIdx] || '').replace(/"/g, '').trim());
        if (/^\d{4}-\d{2}-\d{2}$/.test(date) && hrv > 0 && !isNaN(hrv)) {
          data.push({ date, hrv: Math.round(hrv) });
        }
      }
      return data;
    }

    // ─── CLOUD SYNC ────────────────────────────────────────────────────────

    function mergeCheckins(a, b) {
      const m = {};
      for (const ci of [...(a || []), ...(b || [])]) {
        const key = ci.id || ci.date;
        if (!m[key] || (ci._savedAt || 0) >= (m[key]._savedAt || 0)) m[key] = ci;
      }
      return Object.values(m).sort((x, y) => {
        const dc = x.date.localeCompare(y.date);
        return dc !== 0 ? dc : (x.time || '').localeCompare(y.time || '');
      });
    }
    function mergeExLog(a, b) {
      const m = {};
      for (const el of [...(a || []), ...(b || [])]) {
        if (!m[el.date] || (el._savedAt || 0) >= (m[el.date]._savedAt || 0)) m[el.date] = el;
      }
      return Object.values(m).sort((x, y) => x.date.localeCompare(y.date));
    }
    function mergeProgression(local, cloud) {
      const m = { ...(local || {}) };
      for (const [k, v] of Object.entries(cloud || {})) {
        if (!m[k] || v.level > m[k].level || (v.level === m[k].level && v.streak > m[k].streak)) m[k] = v;
      }
      return m;
    }
    function mergeRunProt(local, cloud) {
      const lS = local?.sessions || [], cS = cloud?.sessions || [];
      const map = {};
      for (const s of [...lS, ...cS]) {
        const key = `${s.date}_${s.week}_${s.sessionNum}`;
        if (!map[key]) map[key] = s;
      }
      return { currentWeek: Math.max(local?.currentWeek || 1, cloud?.currentWeek || 1), sessions: Object.values(map).sort((a, b) => a.date.localeCompare(b.date)) };
    }
    function mergeAppData(local, cloud) {
      if (!cloud || typeof cloud !== 'object') return local;
      return {
        checkins:    mergeCheckins(local.checkins, cloud.checkins),
        exerciseLog: mergeExLog(local.exerciseLog, cloud.exerciseLog),
        progression: mergeProgression(local.progression, cloud.progression),
        runProtocol: mergeRunProt(local.runProtocol, cloud.runProtocol),
      };
    }
    async function cloudPull(url) {
      const sep = url.includes('?') ? '&' : '?';
      const r = await fetch(url + sep + '_t=' + Date.now(), { redirect: 'follow' });
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      return JSON.parse(await r.text());
    }
    async function cloudPush(url, payload) {
      await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify({ ...payload, _pushedAt: new Date().toISOString() }),
        redirect: 'follow',
      });
    }

    // ─── COMPUTATIONS ──────────────────────────────────────────────────────

    // helpers for multi-checkin-per-day
    const dayCIs = (checkins, date) =>
      checkins.filter(c => c.date === date).sort((a, b) => (a.time || '').localeCompare(b.time || ''));
    const latestHRV = (checkins, date, hrvSheet) => {
      const withHRV = [...dayCIs(checkins, date)].reverse().find(c => c.hrv);
      return withHRV?.hrv ?? hrvSheet.find(h => h.date === date)?.hrv ?? null;
    };
    const dayMaxPain = (checkins, date) => {
      const cis = dayCIs(checkins, date).filter(c => c.painR != null);
      return cis.length ? { painR: Math.max(...cis.map(c => c.painR)), painL: Math.max(...cis.map(c => c.painL ?? 0)) } : null;
    };
    const normaliseCI = (ci, idx) => ({
      ...ci,
      id: ci.id || `ci_${ci.date}_${idx}`,
      activityTypes: ci.activityTypes || (ci.activityType ? [ci.activityType] : []),
    });

    function recoveryStatus(checkins, hrvSheet) {
      const cutoff = addDays(today(), -7);
      const rec = checkins.filter(c => c.date >= cutoff);
      const hrvsAll = [];
      Array.from({ length: 7 }, (_, i) => addDays(today(), -6 + i)).forEach(d => {
        const v = latestHRV(rec, d, hrvSheet);
        if (v) hrvsAll.push(v);
      });
      const avgHRV = hrvsAll.length ? hrvsAll.reduce((a, b) => a + b, 0) / hrvsAll.length : null;
      const uniqueDates = [...new Set(rec.map(c => c.date))];
      const pains = uniqueDates.map(d => dayMaxPain(rec, d)).filter(Boolean);
      const avgPain = pains.length ? pains.reduce((a, c) => a + Math.max(c.painR, c.painL), 0) / pains.length : null;
      if (!avgHRV && avgPain == null) return { label: 'NO DATA', color: C.muted, emoji: '⚪' };
      const ratio = avgHRV ? avgHRV / HRV_BASELINE : null;
      if ((ratio && ratio < 0.8) || (avgPain != null && avgPain > 3)) return { label: 'IN THE HOLE', color: C.crit, emoji: '🔴' };
      if (ratio && ratio >= 0.95 && (avgPain == null || avgPain <= 1)) return { label: 'TRENDING UP', color: C.hrv, emoji: '🟢' };
      return { label: 'STABILIZING', color: C.warn, emoji: '🟡' };
    }

    function autoFlags(ci) {
      if (!ci) return [];
      const flags = [];
      const highPain = (ci.painR ?? 0) > 2 || (ci.painL ?? 0) > 2;
      const highAllo = (ci.workStress ?? 0) >= 4 && (ci.hrv ?? 99) < 50;
      if (highPain && highAllo) return [{ level: 'crit', msg: 'Recovery deficit: rest or cross-train only' }];
      if (highPain) flags.push({ level: 'warn', msg: 'Exceeds load threshold — pain >2/10' });
      if (highAllo) flags.push({ level: 'crit', msg: 'High allostatic load — consider reducing training today' });
      return flags;
    }

    function computeInsights(checkins, progression) {
      const out = [];
      const sorted = [...checkins].sort((a, b) => {
        const dc = b.date.localeCompare(a.date);
        return dc !== 0 ? dc : (b.time || '').localeCompare(a.time || '');
      });
      let rStreak = 0;
      for (const c of sorted) { if ((c.painR ?? 99) <= 2) rStreak++; else break; }
      if (rStreak >= 4) out.push(`Right knee pain ≤2 for ${rStreak} days — earliest Week 1 run: ${fmtShort(addDays(today(), 1))}`);
      else if (rStreak > 0) out.push(`Right knee: ${rStreak} day${rStreak > 1 ? 's' : ''} ≤2/10 — need ${4 - rStreak} more for run eligibility`);
      else out.push('Right knee pain >2 — run protocol on hold');
      const r3 = sorted.slice(0, 3);
      if (r3.length === 3 && r3.every(c => (c.hrv ?? 99) < 50 && (c.workStress ?? 0) >= 4))
        out.push(`HRV suppressed + work stress ≥4 for 3 days — stress-compounded recovery`);
      else {
        const latest = sorted[0];
        if (latest?.hrv) {
          const delta = latest.hrv - HRV_BASELINE;
          out.push(`Latest HRV ${latest.hrv}ms (${delta > 0 ? '+' : ''}${delta} vs ${HRV_BASELINE}ms baseline)`);
        } else out.push(`Log daily HRV to unlock trend insights`);
      }
      const r1A = progression?.['1A_R']?.level ?? 1;
      const l1A = progression?.['1A_L']?.level ?? 1;
      if (l1A > r1A) out.push(`Left leg ahead by ${l1A - r1A} level on Split Squat — R is primary, progress conservatively`);
      else if (r1A > l1A) out.push(`Right leg ahead on Split Squat — unexpected given R severity`);
      else out.push(`Both legs at Split Squat level ${r1A} — symmetric progression`);
      return out.slice(0, 3);
    }

    // ─── SHARED UI ─────────────────────────────────────────────────────────

    function Tip({ active, payload, label }) {
      if (!active || !payload?.length) return null;
      return (
        <div style={{ background: C.surface, border: `1px solid ${C.border2}`, padding: '8px 12px', fontSize: 12, fontFamily: MONO, boxShadow: '0 2px 8px rgba(0,0,0,0.1)' }}>
          <div style={{ color: C.textDim, marginBottom: 4 }}>{label}</div>
          {payload.map((p, i) => p.value != null && (
            <div key={i} style={{ color: p.color || C.text }}>{p.name}: {p.value}</div>
          ))}
        </div>
      );
    }

    function MetricCard({ label, value, unit, sub, color, animate }) {
      const [disp, setDisp] = useState(animate && typeof value === 'number' ? 0 : value);
      useEffect(() => {
        if (!animate || typeof value !== 'number') { setDisp(value); return; }
        if (value === 0) { setDisp(0); return; }
        let cur = 0;
        const step = Math.max(1, Math.ceil(value / 30));
        const t = setInterval(() => {
          cur += step;
          if (cur >= value) { setDisp(value); clearInterval(t); }
          else setDisp(cur);
        }, 20);
        return () => clearInterval(t);
      }, [value]);
      return (
        <div style={{ background: C.surface, border: `1px solid ${C.border}`, padding: '12px 16px', minWidth: 110 }}>
          <div style={{ fontSize: 10, color: C.textDim, textTransform: 'uppercase', letterSpacing: 1, fontFamily: SANS, marginBottom: 4 }}>{label}</div>
          <div style={{ fontSize: 26, fontFamily: MONO, color: color || C.text, lineHeight: 1 }}>
            {disp ?? '—'}
            {unit && <span style={{ fontSize: 12, color: C.textDim, marginLeft: 3 }}>{unit}</span>}
          </div>
          {sub && <div style={{ fontSize: 10, color: C.textDim, marginTop: 3, fontFamily: SANS }}>{sub}</div>}
        </div>
      );
    }

    function FlagBanner({ flags }) {
      return flags.map((f, i) => (
        <div key={i} style={{
          background: f.level === 'crit' ? '#ef444420' : '#f59e0b18',
          border: `1px solid ${f.level === 'crit' ? C.crit : C.warn}`,
          padding: '9px 14px', fontSize: 12, fontFamily: MONO,
          color: f.level === 'crit' ? C.crit : C.warn,
          display: 'flex', alignItems: 'center', gap: 8
        }}>
          <span>{f.level === 'crit' ? '⚠' : '△'}</span> {f.msg}
        </div>
      ));
    }

    function Btn({ children, onClick, active, color, small, disabled }) {
      return (
        <button onClick={onClick} disabled={disabled} style={{
          background: active ? (color || C.border2) : 'transparent',
          border: `1px solid ${active ? (color || C.border2) : C.border}`,
          color: active ? C.text : C.textDim,
          padding: small ? '4px 10px' : '8px 16px',
          fontSize: small ? 11 : 13, fontFamily: MONO,
          cursor: disabled ? 'default' : 'pointer',
          borderRadius: 2, opacity: disabled ? 0.4 : 1,
        }}>
          {children}
        </button>
      );
    }

    // ─── DASHBOARD ─────────────────────────────────────────────────────────

    function Dashboard({ checkins, hrvSheet }) {
      const td = today();
      const todayCIs = dayCIs(checkins, td);
      const todayCI = todayCIs[todayCIs.length - 1] || null; // latest today
      const daysInj = daysSince(INJURY_DATE);
      const todayHRV = latestHRV(checkins, td, hrvSheet);
      const hrvDelta = todayHRV != null ? todayHRV - HRV_BASELINE : null;
      const recov = useMemo(() => recoveryStatus(checkins, hrvSheet), [checkins, hrvSheet]);
      const ins = useMemo(() => computeInsights(checkins, {}), [checkins]);
      const flags = useMemo(() => autoFlags(todayCI), [todayCI]);

      const chartData = useMemo(() => {
        const dates = Array.from({ length: 30 }, (_, i) => addDays(td, -29 + i));
        return dates.map((date, idx) => {
          const hrv = latestHRV(checkins, date, hrvSheet);
          const window7 = dates.slice(Math.max(0, idx - 6), idx + 1);
          const vals = window7.map(d => latestHRV(checkins, d, hrvSheet)).filter(Boolean);
          const hrv7 = vals.length ? Math.round(vals.reduce((a, b) => a + b, 0) / vals.length) : null;
          const latestToday = dayCIs(checkins, date).slice(-1)[0];
          const sleepCIs = dayCIs(checkins, date).filter(c => c.sleepHours != null);
          const sleep = sleepCIs.length ? sleepCIs[sleepCIs.length - 1].sleepHours : null;
          return { label: fmtShort(date), hrv, hrv7, stress: latestToday?.workStress ?? null, sleep };
        });
      }, [checkins, hrvSheet, td]);

      const painData = useMemo(() => {
        return Array.from({ length: 14 }, (_, i) => {
          const date = addDays(td, -13 + i);
          const mp = dayMaxPain(checkins, date);
          return { label: fmtShort(date), painR: mp?.painR ?? null, painL: mp?.painL ?? null };
        });
      }, [checkins, td]);

      const weekLoad = useMemo(() => {
        const types = [
          { type: 'Run', color: C.hrv, count: 0 },
          { type: 'Cross', color: C.left, count: 0 },
          { type: 'Rest', color: C.muted, count: 0 },
          { type: 'Physio', color: C.warn, count: 0 },
        ];
        Array.from({ length: 7 }, (_, i) => addDays(td, -6 + i)).forEach(d => {
          dayCIs(checkins, d).forEach(ci => {
            const acts = ci.activityTypes || (ci.activityType ? [ci.activityType] : []);
            if (acts.includes('Run')) types[0].count++;
            if (acts.includes('Cross-train')) types[1].count++;
            if (acts.includes('Rest')) types[2].count++;
            if (acts.includes('Physio session')) types[3].count++;
          });
        });
        return types;
      }, [checkins, td]);

      const hrvColor = todayHRV == null ? C.muted
        : todayHRV >= HRV_BASELINE * 0.95 ? C.hrv
        : todayHRV >= HRV_BASELINE * 0.8 ? C.warn : C.crit;

      return (
        <div style={{ padding: 20, display: 'flex', flexDirection: 'column', gap: 16 }}>
          <FlagBanner flags={flags} />
          <div style={{ display: 'flex', gap: 10, flexWrap: 'wrap' }}>
            <MetricCard label="Days Since Injury" value={daysInj} sub={`Onset ${INJURY_DATE}`} color={C.textDim} animate />
            <MetricCard label="HRV Today" value={todayHRV} unit="ms"
              sub={hrvDelta != null ? `${hrvDelta > 0 ? '+' : ''}${hrvDelta}ms vs baseline` : `Baseline: ${HRV_BASELINE}ms`}
              color={hrvColor} animate />
            <MetricCard label="Pain (L)" value={todayCI?.painL} unit="/10" sub="Left knee — secondary"
              color={todayCI?.painL > 5 ? C.crit : todayCI?.painL > 2 ? C.warn : C.left} animate />
            <MetricCard label="Pain (R)" value={todayCI?.painR} unit="/10" sub="Right knee — primary"
              color={todayCI?.painR > 5 ? C.crit : todayCI?.painR > 2 ? C.warn : C.right} animate />
            <MetricCard label="Work Stress" value={todayCI?.workStress} unit="/5"
              color={todayCI?.workStress >= 4 ? C.crit : todayCI?.workStress >= 3 ? C.warn : C.hrv} animate />
            <MetricCard label="Sleep" value={todayCI?.sleepHours} unit="h"
              sub={todayCI?.sleepQuality != null ? ['','Poor','Fair','OK','Good','Great'][todayCI.sleepQuality] : 'hours last night'}
              color={todayCI?.sleepHours >= 7 ? C.hrv : todayCI?.sleepHours >= 6 ? C.warn : todayCI?.sleepHours != null ? C.crit : C.muted} animate />
            <div style={{
              background: C.surface, border: `2px solid ${recov.color}`,
              padding: '10px 18px', display: 'flex', flexDirection: 'column',
              alignItems: 'center', justifyContent: 'center', gap: 4, minWidth: 130
            }}>
              <div style={{ fontSize: 26 }}>{recov.emoji}</div>

    // ─── CHECK-IN ──────────────────────────────────────────────────────────

    function CheckIn({ checkins, setCheckins, hrvSheet }) {
      const td = today();
      const nowTime = () => new Date().toTimeString().slice(0, 5);

      const [selectedDate, setSelectedDate] = useState(td);
      const [editingId, setEditingId] = useState(null);

      const dateCheckins = useMemo(() =>
        checkins.filter(c => c.date === selectedDate).sort((a, b) => (a.time || '').localeCompare(b.time || '')),
        [checkins, selectedDate]
      );

      const sheetHRV = hrvSheet.find(h => h.date === selectedDate)?.hrv ?? null;
      const emptyForm = () => ({ time: nowTime(), hrv: sheetHRV, hrvManual: false, workStress: null, sleepHours: null, sleepQuality: null, painR: 0, painL: 0, activityTypes: [], notes: '' });

      const [form, setForm] = useState(emptyForm);

      useEffect(() => { setForm(emptyForm()); setEditingId(null); }, [selectedDate]); // eslint-disable-line

      const set = (k, v) => setForm(f => ({ ...f, [k]: v }));
      const toggleActivity = (type) => {
        const cur = form.activityTypes || [];
        set('activityTypes', cur.includes(type) ? cur.filter(t => t !== type) : [...cur, type]);
      };
      const startEdit = (ci) => { setEditingId(ci.id); setForm({ ...normaliseCI(ci, 0) }); };
      const startNew  = () => { setEditingId(null); setForm(emptyForm()); };
      const deleteEntry = (id) => {
        const updated = checkins.filter(c => c.id !== id);
        setCheckins(updated); store.set('checkins', updated);
        if (editingId === id) startNew();
      };
      const save = () => {
        const id = editingId || `ci_${Date.now()}`;
        const entry = { ...form, id, date: selectedDate, _savedAt: Date.now(),
          activityTypes: form.activityTypes || [] };
        const updated = [...checkins.filter(c => c.id !== id), entry]
          .sort((a, b) => a.date !== b.date ? a.date.localeCompare(b.date) : (a.time || '').localeCompare(b.time || ''));
        setCheckins(updated); store.set('checkins', updated);
        if (!editingId) startNew();
      };

      const flags = autoFlags(form);
      const painColor = (v) => v > 5 ? C.crit : v > 2 ? C.warn : C.hrv;
      const LabelRow = ({ children }) => (
        <div style={{ fontSize: 11, color: C.textDim, fontFamily: SANS, textTransform: 'uppercase', letterSpacing: 1, marginBottom: 6 }}>{children}</div>
      );

      return (
        <div style={{ padding: 20, display: 'flex', flexDirection: 'column', gap: 12, maxWidth: 640 }}>
          <FlagBanner flags={flags} />

          {/* Date */}
          <div style={{ background: C.surface, border: `1px solid ${C.border}`, padding: '14px 16px', borderRadius: 10, boxShadow: '0 1px 4px rgba(37,99,235,0.06)' }}>
            <LabelRow>Date</LabelRow>
            <input type="date" value={selectedDate} max={td} min={addDays(td, -60)}
              onChange={e => e.target.value && setSelectedDate(e.target.value)}
              style={{ background: C.surface2, border: `1px solid ${C.border2}`, color: C.text,
                fontFamily: SANS, fontSize: 15, fontWeight: 500, padding: '6px 10px', borderRadius: 6, cursor: 'pointer' }}
            />
            {selectedDate !== td && <div style={{ fontSize: 11, color: C.warn, fontFamily: SANS, marginTop: 6 }}>Past date: {selectedDate}</div>}
          </div>

          {/* Existing entries for this date */}
          {dateCheckins.length > 0 && (
            <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 10, overflow: 'hidden', boxShadow: '0 1px 4px rgba(37,99,235,0.06)' }}>
              <div style={{ padding: '10px 14px', borderBottom: `1px solid ${C.border}`, display: 'flex', justifyContent: 'space-between', alignItems: 'center', background: C.surface2 }}>
                <span style={{ fontSize: 11, fontWeight: 600, color: C.text, fontFamily: SANS }}>{dateCheckins.length} check-in{dateCheckins.length > 1 ? 's' : ''} on {selectedDate}</span>
                <button onClick={startNew} style={{ background: C.left, color: '#fff', border: 'none', padding: '5px 12px', fontSize: 11, fontFamily: SANS, fontWeight: 600, cursor: 'pointer', borderRadius: 6 }}>+ New</button>
              </div>
              {dateCheckins.map(ci => {
                const acts = ci.activityTypes || (ci.activityType ? [ci.activityType] : []);
                const isEditing = editingId === ci.id;
                return (
                  <div key={ci.id} onClick={() => startEdit(ci)} style={{ padding: '10px 14px', borderBottom: `1px solid ${C.border}`, display: 'flex', alignItems: 'center', gap: 10, cursor: 'pointer', background: isEditing ? C.surface2 : 'transparent' }}>
                    <span style={{ fontFamily: MONO, fontSize: 13, color: C.left, minWidth: 40, fontWeight: 600 }}>{ci.time || '—'}</span>
                    <span style={{ fontFamily: MONO, fontSize: 11, color: ci.hrv >= HRV_BASELINE ? C.hrv : ci.hrv ? C.warn : C.muted, minWidth: 48 }}>{ci.hrv ? ci.hrv + 'ms' : '—'}</span>
                    <span style={{ fontSize: 11, fontFamily: MONO, color: (ci.painR ?? 0) > 2 ? C.warn : C.right }}>R:{ci.painR ?? '—'}</span>

                    {isEditing && <span style={{ fontSize: 10, color: C.left, fontFamily: MONO, fontWeight: 600 }}>editing</span>}
                  </div>
                );

            </div>

          {/* Form */}
          <div style={{ background: C.surface, border: `1px solid ${editingId ? C.warn : C.left}`, borderRadius: 10, padding: 16, boxShadow: '0 1px 4px rgba(37,99,235,0.06)' }}>
            <div style={{ fontSize: 12, fontWeight: 700, color: editingId ? C.warn : C.left, fontFamily: SANS, marginBottom: 14, textTransform: 'uppercase', letterSpacing: 0.5 }}>
              {editingId ? '✏ Editing entry' : '+ New Check-in'}
            </div>

            {/* Time */}
            <div style={{ marginBottom: 14 }}>
              <LabelRow>Time</LabelRow>
              <input type="time" value={form.time || ''} onChange={e => set('time', e.target.value)}

              />

            {/* HRV */}
            <div style={{ marginBottom: 14 }}>
              <LabelRow>HRV (ms) {sheetHRV && !form.hrvManual ? '— auto from Sheets' : form.hrvManual ? '— manual' : ''}</LabelRow>
              <div style={{ display: 'flex', alignItems: 'center', gap: 10, flexWrap: 'wrap' }}>
                <input type="number" min={0} max={200} value={form.hrv ?? ''}
                  onChange={e => { set('hrv', e.target.value ? Number(e.target.value) : null); set('hrvManual', true); }}

                {form.hrv != null && (

                  </span>
                )}
                {sheetHRV && form.hrvManual && (
                  <Btn small onClick={() => { set('hrv', sheetHRV); set('hrvManual', false); }}>Reset ({sheetHRV})</Btn>
                )}
              </div>
            </div>

            {/* Work stress */}
            <div style={{ marginBottom: 14 }}>
              <LabelRow>Work Stress (1–5)</LabelRow>
              <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
                {[[1,'😌','Calm'],[2,'🙂','Easy'],[3,'😐','Moderate'],[4,'😓','Stressed'],[5,'😤','Overloaded']].map(([v,icon,label]) => (
                  <button key={v} onClick={() => set('workStress', v)} style={{
                    background: form.workStress === v ? C.surface3 : 'transparent',
                    border: `1px solid ${form.workStress === v ? C.warn : C.border}`,

                    <span style={{ fontSize: 20 }}>{icon}</span>
                    <span style={{ fontSize: 9, fontFamily: SANS, color: C.textDim }}>{label}</span>
                  </button>
                ))}
              </div>
            </div>

            {/* Sleep */}
            <div style={{ marginBottom: 14 }}>
              <LabelRow>Sleep</LabelRow>
              <div style={{ display: 'flex', gap: 16, alignItems: 'flex-start', flexWrap: 'wrap' }}>
                <div>
                  <div style={{ fontSize: 10, color: C.textDim, fontFamily: SANS, marginBottom: 4 }}>Hours</div>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                    <input type="number" min={0} max={16} step={0.5} value={form.sleepHours ?? ''}
                      onChange={e => set('sleepHours', e.target.value ? Number(e.target.value) : null)}
                      placeholder="—"
                      style={{ background: C.surface2, border: `1px solid ${C.border2}`, color: C.text, fontFamily: MONO, fontSize: 22, padding: '6px 10px', width: 80, borderRadius: 6 }}
                    />

                    {form.sleepHours != null && (
                      <span style={{ fontSize: 11, fontFamily: MONO, color: form.sleepHours >= 7 ? C.hrv : form.sleepHours >= 6 ? C.warn : C.crit }}>
                        {form.sleepHours >= 7 ? '✓ Good' : form.sleepHours >= 6 ? '⚠ Low' : '▲ Poor'}
                      </span>
                    )}
                  </div>
                </div>
                <div>
                  <div style={{ fontSize: 10, color: C.textDim, fontFamily: SANS, marginBottom: 4 }}>Quality</div>
                  <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
                    {[[1,'😴','Poor'],[2,'😕','Fair'],[3,'😐','OK'],[4,'🙂','Good'],[5,'😊','Great']].map(([v, icon, label]) => (
                      <button key={v} onClick={() => set('sleepQuality', form.sleepQuality === v ? null : v)} style={{
                        background: form.sleepQuality === v ? C.surface3 : 'transparent',
                        border: `1px solid ${form.sleepQuality === v ? C.hrv : C.border}`,
                        color: C.text, padding: '7px 10px', cursor: 'pointer', borderRadius: 8,
                        display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 2,
                        opacity: form.sleepQuality && form.sleepQuality !== v ? 0.4 : 1,
                      }}>
                        <span style={{ fontSize: 20 }}>{icon}</span>
                        <span style={{ fontSize: 9, fontFamily: SANS, color: C.textDim }}>{label}</span>
                      </button>

                  </div>

              </div>
            </div>

            {/* Pain R */}
            <div style={{ marginBottom: 14 }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 6 }}>

              <div style={{ display: 'flex', alignItems: 'center', gap: 14 }}>

                  const sel = (form.activityTypes || []).includes(type);
                  return (
                    <button key={type} onClick={() => toggleActivity(type)} style={{
                      background: sel ? C.left+'18' : 'transparent',
                      border: `1px solid ${sel ? C.left : C.border}`,

            <div style={{ marginBottom: 14 }}>

    // ─── EXERCISES ─────────────────────────────────────────────────────────

    function Exercises({ exerciseLog, setExerciseLog, progression, setProgression }) {
      const td = today();
      const todayLog = (exerciseLog.find(e => e.date === td) || {}).completions || {};

      const toggleDone = (track, leg) => {
        const key = `${track}_${leg}`;
        const current = (todayLog[key] || {}).done || false;
        const level = (progression[key] || { level: 1 }).level;
        const existing = exerciseLog.find(e => e.date === td);
        const updatedCompletions = { ...(existing?.completions || {}), [key]: { done: !current, level } };
        const newLog = [...exerciseLog.filter(e => e.date !== td), { date: td, completions: updatedCompletions, _savedAt: Date.now() }]
          .sort((a, b) => a.date.localeCompare(b.date));
        setExerciseLog(newLog);
        store.set('exerciseLog', newLog);

        if (!current) {
          let streak = 1;
          let d = addDays(td, -1);
          for (let i = 0; i < 10; i++) {
            const prev = newLog.find(e => e.date === d);
            const pd = (prev?.completions || {})[key];
            if (pd?.done && pd?.level === level) { streak++; d = addDays(d, -1); }
            else break;
          }
          const newProg = { ...progression, [key]: { level, streak } };
          setProgression(newProg);
          store.set('progression', newProg);
        } else {
          const cur = progression[key] || { level: 1, streak: 0 };
          const newProg = { ...progression, [key]: { ...cur, streak: Math.max(0, cur.streak - 1) } };
          setProgression(newProg);
          store.set('progression', newProg);
        }
      };

      const advanceLevel = (track, leg) => {
        const key = `${track}_${leg}`;
        const cur = progression[key] || { level: 1, streak: 0 };
        const maxLevel = EX[track].levels.length;
        if (cur.level >= maxLevel) return;
        const newProg = { ...progression, [key]: { level: cur.level + 1, streak: 0 } };
        setProgression(newProg);
        store.set('progression', newProg);
      };

      return (
        <div style={{ padding: 20, display: 'flex', flexDirection: 'column', gap: 12 }}>
          <div style={{ fontSize: 11, color: C.textDim, fontFamily: SANS }}>
            E3 Rehab — Compression Model. 3 consecutive completions per leg unlocks next level.
          </div>
          {Object.entries(EX).map(([id, def]) => (
            <div key={id} style={{ background: C.surface, border: `1px solid ${C.border}` }}>
              <div style={{
                padding: '10px 14px', background: C.surface2,
                borderBottom: `1px solid ${C.border}`,
                display: 'flex', alignItems: 'baseline', gap: 12
              }}>
                <span style={{ fontSize: 10, color: C.textDim, fontFamily: MONO }}>Track {def.track}</span>
                <span style={{ fontFamily: SANS, fontSize: 14, color: C.text, fontWeight: 600 }}>{def.name}</span>
                <span style={{ fontSize: 11, color: C.textDim, fontFamily: MONO }}>[{id}]</span>
              </div>
              <div style={{ padding: '12px 14px', display: 'flex', gap: 16, flexWrap: 'wrap' }}>
                {[['R', C.right, 'RIGHT'], ['L', C.left, 'LEFT']].map(([leg, color, label]) => {
                  const key = `${id}_${leg}`;
                  const prog = progression[key] || { level: 1, streak: 0 };
                  const levelDef = def.levels[prog.level - 1];
                  if (!levelDef) return null;
                  const done = (todayLog[key] || {}).done || false;
                  const canAdvance = prog.streak >= 3 && prog.level < def.levels.length;
                  const nextLevelDef = def.levels[prog.level];
                  return (
                    <div key={leg} style={{
                      flex: 1, minWidth: 220,
                      background: C.surface3, border: `1px solid ${C.border}`, padding: '10px 12px'
                    }}>
                      <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 8 }}>
                        <div style={{ width: 8, height: 8, background: color }} />
                        <span style={{ fontSize: 10, color, fontFamily: MONO, letterSpacing: 1 }}>{label}</span>
                        <span style={{ fontSize: 10, color: C.textDim, fontFamily: MONO, marginLeft: 'auto' }}>
                          Streak {prog.streak}/3
                        </span>
                      </div>
                      <div style={{ marginBottom: 8 }}>
                        <div style={{ fontSize: 10, color: C.textDim, fontFamily: SANS, marginBottom: 3 }}>Level {prog.level} — Active</div>
                        <div style={{ fontSize: 13, color: C.text, fontFamily: SANS, marginBottom: 2 }}>{levelDef.name}</div>
                        <div style={{ fontSize: 11, color: C.textDim, fontFamily: MONO, marginBottom: 6 }}>{levelDef.sets} × {levelDef.reps}</div>
                        <VideoLink url={VIDEO_MAP[`${id}_${levelDef.n}`]} small />
                      </div>
                      <button onClick={() => toggleDone(id, leg)} style={{
                        background: done ? color + '33' : 'transparent',
                        border: `1px solid ${done ? color : C.border2}`,
                        color: done ? color : C.textDim,
                        padding: '6px 14px', fontSize: 12, fontFamily: MONO,
                        cursor: 'pointer', borderRadius: 2, width: '100%', marginBottom: 8
                      }}>
                        {done ? '✓ DONE TODAY' : 'MARK DONE'}
                      </button>
                      <div style={{ display: 'flex', gap: 4, marginBottom: 8 }}>
                        {[1, 2, 3].map(i => (
                          <div key={i} style={{ flex: 1, height: 4, background: prog.streak >= i ? color : C.border2 }} />
                        ))}
                      </div>
                      {nextLevelDef ? (
                        <div style={{ opacity: canAdvance ? 1 : 0.4, borderTop: `1px solid ${C.border}`, paddingTop: 8 }}>
                          <div style={{ fontSize: 10, color: C.textDim, fontFamily: SANS, marginBottom: 3 }}>
                            Level {prog.level + 1} — {canAdvance ? '🔓 UNLOCKED' : '🔒 Locked'}
                          </div>
                          <div style={{ fontSize: 12, color: C.textDim, fontFamily: SANS }}>{nextLevelDef.name}</div>
                          {canAdvance && (
                            <button onClick={() => advanceLevel(id, leg)} style={{
                              background: C.left+'15', border: `1px solid ${C.left}`,
                              color: C.left, padding: '4px 10px', fontSize: 11,
                              fontFamily: MONO, cursor: 'pointer', borderRadius: 2, marginTop: 6
                            }}>
                              ADVANCE TO LEVEL {prog.level + 1}
                            </button>
                          )}
                        </div>
                      ) : (
                        <div style={{ fontSize: 10, color: C.hrv, fontFamily: MONO, opacity: 0.8 }}>✓ Max level reached</div>
                      )}
                    </div>
                  );
                })}
              </div>
            </div>
          ))}
        </div>
      );
    }

    // ─── RUN PROTOCOL ──────────────────────────────────────────────────────

    function RunProtocol({ runProtocol, setRunProtocol, checkins }) {
      const td = today();
      const currentWeek = runProtocol.currentWeek || 1;
      const sessions = runProtocol.sessions || [];
      const weekSessions = sessions.filter(s => s.week === currentWeek);
      const completedSessions = weekSessions.filter(s => s.completed);
      const weekDef = RUN_WEEKS[Math.min(currentWeek - 1, RUN_WEEKS.length - 1)];
      const canAdvance = completedSessions.length >= 3 && currentWeek < 4;

      const logSession = () => {
        const ci = checkins.find(c => c.date === td);
        const painR = ci?.painR ?? 0;
        const painL = ci?.painL ?? 0;
        const regressed = painR > 2 || painL > 2;
        const sessionNum = weekSessions.length + 1;
        const newSession = { date: td, week: currentWeek, sessionNum, painR, painL, completed: !regressed, regressed };
        const updated = { ...runProtocol, sessions: [...sessions, newSession] };
        setRunProtocol(updated);
        store.set('runProtocol', updated);
      };

      const advanceWeek = () => {
        const updated = { ...runProtocol, currentWeek: currentWeek + 1 };
        setRunProtocol(updated);
        store.set('runProtocol', updated);
      };

      return (
        <div style={{ padding: 20, display: 'flex', flexDirection: 'column', gap: 16 }}>
          <div style={{ fontSize: 11, color: C.textDim, fontFamily: SANS }}>
            Advance only when 3 sessions completed, pain ≤2/10 both legs. RIGHT pain >2 = regression, session not counted.
          </div>
          <div style={{ display: 'flex', gap: 10, flexWrap: 'wrap' }}>
            {RUN_WEEKS.map(w => {
              const wS = sessions.filter(s => s.week === w.week);
              const wC = wS.filter(s => s.completed).length;
              const isCur = w.week === currentWeek;
              const isPast = w.week < currentWeek;
              return (
                <div key={w.week} style={{
                  background: isCur ? C.surface2 : C.surface,
                  border: `1px solid ${isCur ? C.hrv : C.border}`,
                  padding: '14px 18px', minWidth: 155,
                  opacity: w.week > currentWeek ? 0.45 : 1
                }}>
                  <div style={{ fontSize: 10, color: isCur ? C.hrv : C.textDim, fontFamily: MONO, letterSpacing: 1, marginBottom: 6 }}>
                    WEEK {w.week} {isCur ? '◀ CURRENT' : isPast ? '✓ DONE' : ''}
                  </div>
                  {w.run ? (
                    <>
                      <div style={{ fontSize: 13, color: C.text, fontFamily: SANS, marginBottom: 2 }}>
                        {w.run}min run / {w.walk}min walk
                      </div>
                      <div style={{ fontSize: 11, color: C.textDim, fontFamily: MONO }}>× {w.reps} · {w.freq}×/week</div>
                    </>
                  ) : (
                    <div style={{ fontSize: 12, color: C.text, fontFamily: SANS }}>{w.desc}</div>
                  )}
                  <div style={{ display: 'flex', gap: 5, marginTop: 10 }}>
                    {[1, 2, 3].map(n => {
                      const s = wS.find(x => x.sessionNum === n);
                      const col = s ? (s.completed ? C.hrv : C.crit) : C.border2;
                      return (
                        <div key={n} style={{
                          width: 26, height: 26,
                          background: s ? col + '33' : 'transparent',
                          border: `1px solid ${col}`,
                          display: 'flex', alignItems: 'center', justifyContent: 'center',
                          fontSize: 10, color: col, fontFamily: MONO
                        }}>
                          {s ? (s.regressed ? '✗' : '✓') : n}
                        </div>
                      );
                    })}
                  </div>
                  {isCur && <div style={{ fontSize: 10, color: C.textDim, fontFamily: SANS, marginTop: 5 }}>{wC}/3 completed</div>}
                </div>
              );
            })}
          </div>

          <div style={{ background: C.surface, border: `1px solid ${C.border}`, padding: 16 }}>
            <div style={{ fontSize: 12, color: C.hrv, fontFamily: MONO, letterSpacing: 1, marginBottom: 10 }}>WEEK {currentWeek} — ACTIVE</div>
            {weekDef?.run ? (
              <div style={{ marginBottom: 14 }}>
                <div style={{ fontSize: 18, color: C.text, fontFamily: SANS, marginBottom: 4 }}>
                  {weekDef.run}min run / {weekDef.walk}min walk × {weekDef.reps}
                </div>
                <div style={{ fontSize: 12, color: C.textDim, fontFamily: MONO }}>
                  ~{(weekDef.run + weekDef.walk) * weekDef.reps}min total · {weekDef.freq}×/week
                </div>
              </div>
            ) : weekDef && (
              <div style={{ fontSize: 15, color: C.text, fontFamily: SANS, marginBottom: 14 }}>{weekDef.desc}</div>
            )}
            <div style={{ display: 'flex', gap: 10, flexWrap: 'wrap' }}>
              <button onClick={logSession} style={{
                background: C.left+'15', border: `1px solid ${C.left}`,
                color: C.left, padding: '10px 20px', fontSize: 12,
                fontFamily: MONO, cursor: 'pointer', borderRadius: 2
              }}>+ LOG TODAY'S SESSION</button>
              {canAdvance && (
                <button onClick={advanceWeek} style={{
                  background: C.hrv + '22', border: `1px solid ${C.hrv}`,
                  color: C.hrv, padding: '10px 20px', fontSize: 12,
                  fontFamily: MONO, cursor: 'pointer', borderRadius: 2
                }}>ADVANCE TO WEEK {currentWeek + 1} →</button>
              )}
            </div>
          </div>

          {sessions.length > 0 && (
            <div style={{ background: C.surface, border: `1px solid ${C.border}`, padding: 16 }}>
              <div style={{ fontSize: 10, color: C.textDim, fontFamily: SANS, textTransform: 'uppercase', letterSpacing: 1, marginBottom: 10 }}>Session Log</div>
              <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 12, fontFamily: MONO }}>
                <thead>
                  <tr style={{ borderBottom: `1px solid ${C.border}` }}>
                    {['Date', 'Wk', '#', 'R', 'L', 'Status'].map(h => (
                      <th key={h} style={{ padding: '6px 10px', color: C.textDim, fontFamily: SANS, fontSize: 10, textAlign: 'left', textTransform: 'uppercase', letterSpacing: 1 }}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {[...sessions].reverse().map((s, i) => (
                    <tr key={i} style={{ borderBottom: `1px solid ${C.border}` }}>
                      <td style={{ padding: '6px 10px', color: C.textDim }}>{s.date}</td>
                      <td style={{ padding: '6px 10px', color: C.text }}>W{s.week}</td>
                      <td style={{ padding: '6px 10px', color: C.text }}>{s.sessionNum}</td>
                      <td style={{ padding: '6px 10px', color: s.painR > 2 ? C.warn : C.right }}>{s.painR}</td>
                      <td style={{ padding: '6px 10px', color: s.painL > 2 ? C.warn : C.left }}>{s.painL}</td>
                      <td style={{ padding: '6px 10px', color: s.completed ? C.hrv : C.crit }}>{s.completed ? '✓ OK' : '✗ Regressed'}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}
        </div>
      );
    }

    // ─── HISTORY ───────────────────────────────────────────────────────────

    function History({ checkins }) {
      const [sortDir, setSortDir] = useState('desc');
      const sorted = useMemo(() =>
        [...checkins].sort((a, b) => {
          const dc = sortDir === 'desc' ? b.date.localeCompare(a.date) : a.date.localeCompare(b.date);
          if (dc !== 0) return dc;
          const tc = (a.time || '').localeCompare(b.time || '');
          return sortDir === 'desc' ? -tc : tc;
        }),
        [checkins, sortDir]
      );
      const exportCSV = () => {
        const hdr = ['Date', 'Time', 'HRV', 'Stress', 'Sleep_h', 'Sleep_Q', 'Pain_R', 'Pain_L', 'Activities', 'Notes'];
        const rows = sorted.map(c => [
          c.date,
          c.time ?? '',
          c.hrv ?? '',
          c.workStress ?? '',
          c.sleepHours ?? '',
          c.sleepQuality ?? '',
          c.painR ?? '',
          c.painL ?? '',
          (c.activityTypes || (c.activityType ? [c.activityType] : [])).join(';'),
          (c.notes ?? '').replace(/,/g, ';'),
        ]);
        const csv = [hdr, ...rows].map(r => r.join(',')).join('\n');
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href = url; a.download = 'itbs-history.csv'; a.click();
        URL.revokeObjectURL(url);
      };
      return (
        <div style={{ padding: 20 }}>
          <div style={{ display: 'flex', gap: 10, marginBottom: 16, alignItems: 'center' }}>
            <span style={{ fontSize: 11, color: C.textDim, fontFamily: SANS }}>{sorted.length} entries</span>
            <Btn small onClick={() => setSortDir(d => d === 'desc' ? 'asc' : 'desc')}>
              {sortDir === 'desc' ? '↓ Newest first' : '↑ Oldest first'}
            </Btn>
            <Btn small onClick={exportCSV}>Export CSV</Btn>
          </div>
          {sorted.length === 0 ? (
            <div style={{ color: C.textDim, fontFamily: SANS, fontSize: 13, padding: 20 }}>
              No check-ins yet. Start in the Check-in tab.
            </div>
          ) : (
            <div style={{ overflowX: 'auto' }}>
              <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 12, fontFamily: MONO }}>
                <thead>
                  <tr style={{ borderBottom: `1px solid ${C.border}` }}>
                    {['Date', 'Time', 'HRV ms', 'Stress', 'Sleep h', 'Sleep Q', 'Pain R', 'Pain L', 'Activities', 'Notes'].map(h => (
                      <th key={h} style={{ padding: '8px 10px', color: C.textDim, fontFamily: SANS, fontSize: 10, textAlign: 'left', textTransform: 'uppercase', letterSpacing: 1, whiteSpace: 'nowrap' }}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {sorted.map((c, i) => {
                    const activities = c.activityTypes || (c.activityType ? [c.activityType] : []);
                    return (
                      <tr key={c.id || c.date + (c.time || '')} style={{ borderBottom: `1px solid ${C.border}`, background: i % 2 === 0 ? 'transparent' : C.surface3 + '44' }}>
                        <td style={{ padding: '8px 10px', color: C.textDim }}>{c.date}</td>
                        <td style={{ padding: '8px 10px', color: C.textDim }}>{c.time || '—'}</td>
                        <td style={{ padding: '8px 10px', color: c.hrv >= HRV_BASELINE ? C.hrv : c.hrv >= HRV_BASELINE * 0.8 ? C.warn : c.hrv ? C.crit : C.textDim }}>{c.hrv ?? '—'}</td>
                        <td style={{ padding: '8px 10px', color: c.workStress >= 4 ? C.crit : c.workStress >= 3 ? C.warn : C.text }}>{c.workStress ?? '—'}</td>
                        <td style={{ padding: '8px 10px', color: c.sleepHours >= 7 ? C.hrv : c.sleepHours >= 6 ? C.warn : c.sleepHours != null ? C.crit : C.textDim }}>{c.sleepHours != null ? c.sleepHours + 'h' : '—'}</td>
                        <td style={{ padding: '8px 10px', color: C.textDim }}>{c.sleepQuality != null ? ['','😴','😕','😐','🙂','😊'][c.sleepQuality] : '—'}</td>
                        <td style={{ padding: '8px 10px', color: c.painR > 2 ? C.warn : C.right }}>{c.painR != null ? c.painR : '—'}</td>
                        <td style={{ padding: '8px 10px', color: c.painL > 2 ? C.warn : C.left }}>{c.painL != null ? c.painL : '—'}</td>
                        <td style={{ padding: '8px 10px', color: C.text }}>
                          {activities.length > 0 ? (
                            <div style={{ display: 'flex', gap: 4, flexWrap: 'wrap' }}>
                              {activities.map(a => (
                                <span key={a} style={{ background: C.surface3, border: `1px solid ${C.border}`, borderRadius: 4, padding: '1px 6px', fontSize: 10, fontFamily: SANS, color: C.text }}>{a}</span>
                              ))}
                            </div>
                          ) : '—'}
                        </td>
                        <td style={{ padding: '8px 10px', color: C.textDim, maxWidth: 180, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{c.notes || '—'}</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          )}
        </div>
      );
    }

  var sh = getOrCreate();
  var v = sh.getRange('A1').getValue();
  return ContentService
    .createTextOutput(v || '{}')
    .setMimeType(ContentService.MimeType.JSON);
}
function doPost(e) {
  var sh = getOrCreate();
  sh.getRange('A1').setValue(e.postData.contents);

  return ContentService
    .createTextOutput('{"ok":true}')

}
function getOrCreate() {

    function App() {
      const [activeTab, setActiveTab] = useState('dashboard');
      const [checkins, setCheckins] = useState(() => {
        const raw = store.get('checkins') || [];
        return raw.map((ci, i) => normaliseCI(ci, i));
      });
      const [exerciseLog, setExerciseLog] = useState(() => store.get('exerciseLog') || []);
      const [progression, setProgression] = useState(() => store.get('progression') || {});
      const [runProtocol, setRunProtocol] = useState(() => store.get('runProtocol') || { currentWeek: 1, sessions: [] });
      const [hrvSheet, setHrvSheet] = useState(() => store.get('hrvData') || []);
      const [syncState, setSyncState] = useState({ loading: false, lastSync: store.get('lastSync'), error: null });
      const [storageErr, setStorageErr] = useState(null);
      const [syncUrl, setSyncUrl] = useState(() => store.get('syncUrl') || '');
      const [cloudState, setCloudState] = useState({ syncing: false, lastSync: store.get('cloudLastSync'), error: null });
      const [showSyncSetup, setShowSyncSetup] = useState(false);
      const cloudPushTimer = React.useRef(null);
      const isMounting = React.useRef(true);

      useEffect(() => {
        const link = document.createElement('link');
        link.rel = 'stylesheet';
        link.href = 'https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Montserrat:wght@400;500;600;700&display=swap';
        document.head.appendChild(link);
        const ok = store.set('_ping', 1);
        if (!ok) setStorageErr('Storage unavailable — data will not persist between sessions');
      }, []);

      const doSync = useCallback(async () => {
        setSyncState(s => ({ ...s, loading: true, error: null }));
        try {
          const data = await syncHRV();
          const lastSync = new Date().toISOString();
          setHrvSheet(data);
          store.set('hrvData', data);
          store.set('lastSync', lastSync);
          setSyncState({ loading: false, lastSync, error: null });
        } catch (e) {
          setSyncState(s => ({ ...s, loading: false, error: e.message }));
        }
      }, []);

      useEffect(() => { doSync(); }, []);

      // Pull from cloud on mount / when URL changes
      useEffect(() => {
        if (!syncUrl) { isMounting.current = false; return; }
        const local = { checkins, exerciseLog, progression, runProtocol };
        setCloudState(s => ({ ...s, syncing: true, error: null }));
        cloudPull(syncUrl)
          .then(cloud => {
            const merged = mergeAppData(local, cloud);
            setCheckins(merged.checkins);       store.set('checkins', merged.checkins);
            setExerciseLog(merged.exerciseLog); store.set('exerciseLog', merged.exerciseLog);
            setProgression(merged.progression); store.set('progression', merged.progression);
            setRunProtocol(merged.runProtocol); store.set('runProtocol', merged.runProtocol);
            return cloudPush(syncUrl, merged);
          })
          .then(() => {
            const ts = new Date().toISOString();
            store.set('cloudLastSync', ts);
            setCloudState({ syncing: false, lastSync: ts, error: null });
          })
          .catch(e => setCloudState(s => ({ ...s, syncing: false, error: e.message })))
          .finally(() => { isMounting.current = false; });
      }, [syncUrl]); // eslint-disable-line

      // Auto-push 2 s after any data change
      useEffect(() => {
        if (isMounting.current || !syncUrl) return;
        clearTimeout(cloudPushTimer.current);
        cloudPushTimer.current = setTimeout(() => {
          cloudPush(syncUrl, { checkins, exerciseLog, progression, runProtocol })
            .then(() => { const ts = new Date().toISOString(); store.set('cloudLastSync', ts); setCloudState(s => ({ ...s, lastSync: ts, error: null })); })
            .catch(e => setCloudState(s => ({ ...s, error: e.message })));
        }, 2000);
      }, [checkins, exerciseLog, progression, runProtocol]); // eslint-disable-line

      const handleSyncUrlSave = (url) => {
        setSyncUrl(url); store.set('syncUrl', url); setShowSyncSetup(false); isMounting.current = true;
      };

      const recov = useMemo(() => recoveryStatus(checkins, hrvSheet), [checkins, hrvSheet]);
      const tabs = [
        { id: 'dashboard', label: 'Dashboard' },
        { id: 'checkin', label: 'Check-in' },
        { id: 'exercises', label: 'Exercises' },
        { id: 'runprotocol', label: 'Run Protocol' },
        { id: 'history', label: 'History' },
        { id: 'guide', label: 'Exercise Guide' },
      ];

      return (
        <div style={{ background: C.bg, color: C.text, minHeight: '100vh', fontFamily: SANS, fontSize: 14 }}>
          {showSyncSetup && <SyncSetup syncUrl={syncUrl} onSave={handleSyncUrlSave} onClose={() => setShowSyncSetup(false)} />}
          <style>{`
            * { box-sizing: border-box; margin: 0; padding: 0; }
            ::-webkit-scrollbar { width: 6px; height: 6px; }
            ::-webkit-scrollbar-track { background: ${C.bg}; }
            ::-webkit-scrollbar-thumb { background: ${C.border2}; border-radius: 3px; }
            input[type=range] { cursor: pointer; height: 4px; }
            button { transition: opacity 0.1s; }
          `}</style>

          {/* Header */}
          <div style={{
            background: C.surface, borderBottom: `1px solid ${C.border}`,
            padding: '12px 20px', display: 'flex', alignItems: 'center', gap: 14, flexWrap: 'wrap'
          }}>
            <div style={{ fontFamily: SANS, fontSize: 15, color: C.text, fontWeight: 700, letterSpacing: 1 }}>ITBS REHAB</div>
            <div style={{ width: 1, height: 20, background: C.border }} />
            <div style={{ fontSize: 10, color: C.textDim, fontFamily: SANS }}>Bilateral · E3 Protocol · Diagnofisic Milano</div>
            <div style={{ marginLeft: 'auto', display: 'flex', alignItems: 'center', gap: 14, flexWrap: 'wrap' }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 7 }}>
                <span style={{ fontSize: 16 }}>{recov.emoji}</span>
                <span style={{ fontSize: 10, color: recov.color, fontFamily: MONO, letterSpacing: 1 }}>{recov.label}</span>
              </div>
              <div style={{ display: 'flex', alignItems: 'center', gap: 8, flexWrap: 'wrap' }}>
                {syncState.error && <span style={{ fontSize: 10, color: C.warn, fontFamily: MONO }}>⚠ HRV failed</span>}
                <button onClick={doSync} disabled={syncState.loading} style={{
                  background: 'transparent', border: `1px solid ${C.border}`,
                  color: C.textDim, padding: '4px 10px', fontSize: 10, fontFamily: MONO,
                  cursor: 'pointer', borderRadius: 4
                }}>{syncState.loading ? '⟳…' : '⟳ HRV'}</button>
                <div style={{ display:'flex', alignItems:'center', gap:6, borderLeft:`1px solid ${C.border}`, paddingLeft:8 }}>
                  {cloudState.error
                    ? <span style={{ fontSize:10, color:C.crit, fontFamily:MONO }}>☁ error</span>
                    : cloudState.syncing
                    ? <span style={{ fontSize:10, color:C.left, fontFamily:MONO }}>☁ syncing…</span>
                    : syncUrl && cloudState.lastSync
                    ? <span style={{ fontSize:10, color:C.hrv, fontFamily:MONO }}>☁ {fmtTime(cloudState.lastSync)}</span>
                    : <span style={{ fontSize:10, color:C.muted, fontFamily:MONO }}>☁ not set up</span>
                  }
                  <button onClick={() => setShowSyncSetup(true)} style={{
                    background: syncUrl ? C.left+'15' : C.surface3, border:`1px solid ${syncUrl ? C.left+'50' : C.border}`,
                    color: syncUrl ? C.left : C.textDim, padding:'4px 10px', fontSize:11,
                    fontFamily:SANS, fontWeight:600, cursor:'pointer', borderRadius:4
                  }}>⚙ Sync</button>
                </div>
              </div>
            </div>
          </div>

          {/* Banners */}
          {syncState.error && (
            <div style={{ background: '#f59e0b12', borderBottom: `1px solid ${C.warn}`, padding: '8px 20px', fontSize: 11, color: C.warn, fontFamily: MONO }}>
              △ HRV sync failed ({syncState.error}) — enter HRV manually in Check-in
            </div>
          )}
          {storageErr && (
            <div style={{ background: '#ef444412', borderBottom: `1px solid ${C.crit}`, padding: '8px 20px', fontSize: 11, color: C.crit, fontFamily: MONO }}>
              ⚠ {storageErr}
            </div>
          )}

          {/* Tab nav */}
          <div style={{ borderBottom: `1px solid ${C.border}`, display: 'flex', overflowX: 'auto' }}>
            {tabs.map(t => (
              <button key={t.id} onClick={() => setActiveTab(t.id)} style={{
                background: 'transparent',
                borderBottom: `2px solid ${activeTab === t.id ? C.left : 'transparent'}`,
                borderTop: 'none', borderLeft: 'none', borderRight: 'none',
                color: activeTab === t.id ? C.text : C.textDim,
                padding: '10px 18px', fontSize: 12, fontFamily: SANS,
                fontWeight: activeTab === t.id ? 600 : 400,
                cursor: 'pointer', whiteSpace: 'nowrap'
              }}>{t.label}</button>
            ))}
          </div>

          {/* Content */}
          {activeTab === 'dashboard' && <Dashboard checkins={checkins} hrvSheet={hrvSheet} />}
          {activeTab === 'checkin' && <CheckIn checkins={checkins} setCheckins={setCheckins} hrvSheet={hrvSheet} />}
          {activeTab === 'exercises' && <Exercises exerciseLog={exerciseLog} setExerciseLog={setExerciseLog} progression={progression} setProgression={setProgression} />}
          {activeTab === 'runprotocol' && <RunProtocol runProtocol={runProtocol} setRunProtocol={setRunProtocol} checkins={checkins} />}
          {activeTab === 'history' && <History checkins={checkins} />}
          {activeTab === 'guide' && <ExerciseGuide />}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
